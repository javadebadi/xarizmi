name: Continuous Integration

on:
  pull_request:
  push:
    branches:
      - master

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Install TA-Lib C library
        run: |
          sudo apt-get update -q
          sudo apt-get install -y python3-dev libatlas-base-dev
          curl -L -o ta-lib-0.4.0-src.tar.gz \
            https://prdownloads.sourceforge.net/ta-lib/ta-lib-0.4.0-src.tar.gz
          tar -xzf ta-lib-0.4.0-src.tar.gz
          cd ta-lib/
          ./configure --prefix=/usr
          make
          sudo make install

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: |
          uv venv --python=${{ matrix.python-version }}
          uv sync --dev

      - name: Lint with ruff
        run: uv run invoke code.check

      - name: Type check with mypy
        run: uv run invoke code.mypy

      - name: Complexity analysis
        run: uv run invoke code.complexity --path=xarizmi

      - name: Test with pytest
        run: uv run invoke code.test
